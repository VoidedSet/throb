<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dream Face Sandbox - Retro Render</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffaa;
            font-family: monospace;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border: 1px solid #00ffaa;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="info">Dream Face Sandbox<br>Retro Post-Processing Active</div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Post-Processing Imports
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { RenderPixelatedPass } from 'three/addons/postprocessing/RenderPixelatedPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // 1. Setup Scene & Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace; // Keeps colors from washing out
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);

        // 2. BRIGHTER Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 1.5)); // Cranked up ambient
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5); // Strong main light
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0xaaaaff, 1.0); // Blue rim light
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        // 3. Inline Custom Shaders (Posterization & Chromatic Aberration)
        const PosterizationShader = {
            uniforms: { "tDiffuse": { value: null }, "levels": { value: 9.0 }, "strength": { value: 0.3 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float levels; uniform float strength; varying vec2 vUv;
                void main() {
                    vec4 texel = texture2D(tDiffuse, vUv);
                    vec3 posterized = floor(texel.rgb * levels) / levels;
                    gl_FragColor = vec4(mix(texel.rgb, posterized, strength), texel.a);
                }`
        };

        const ChromaticAberrationShader = {
            uniforms: { "tDiffuse": { value: null }, "aberrationStrength": { value: 0.005 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float aberrationStrength; varying vec2 vUv;
                void main() {
                    vec2 distFromCenter = vUv - 0.5;
                    vec2 aberrated = aberrationStrength * pow(length(distFromCenter), 2.0) * normalize(distFromCenter);
                    float r = texture2D(tDiffuse, vUv + aberrated).r;
                    float g = texture2D(tDiffuse, vUv).g;
                    float b = texture2D(tDiffuse, vUv - aberrated).b;
                    gl_FragColor = vec4(r, g, b, 1.0);
                }`
        };

        // 4. Setup EffectComposer (Matches your Renderer.js)
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const pixelatedPass = new RenderPixelatedPass(4, scene, camera, { normalEdgeStrength: 0.4, depthEdgeStrength: 0.4 });
        composer.addPass(pixelatedPass);

        const posterPass = new ShaderPass(PosterizationShader);
        composer.addPass(posterPass);

        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.2, 0.1);
        composer.addPass(bloomPass);

        const chromaPass = new ShaderPass(ChromaticAberrationShader);
        composer.addPass(chromaPass);

        composer.addPass(new OutputPass());

        // 5. The Dream Face Shader
        // const dreamFaceMaterial = new THREE.ShaderMaterial({
        //     uniforms: {
        //         time: { value: 0.0 },
        //         map: { value: null },
        //         pixelSize: { value: 12.0 } // Size of the censor blocks in monitor pixels
        //     },
        //     vertexShader: `
        //         varying vec2 vUv; 
        //         void main() { 
        //             vUv = uv; 
        //             gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); 
        //         }
        //     `,
        //     fragmentShader: `
        //         uniform float time; 
        //         uniform sampler2D map; 
        //         uniform float pixelSize; 
        //         varying vec2 vUv;

        //         // Standard random noise generator
        //         float rand(vec2 co){ 
        //             return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); 
        //         }

        //         void main() {
        //             // 1. gl_FragCoord gives the exact pixel on your monitor.
        //             // We divide and floor it to create a rigid 2D screen grid (the censor blocks).
        //             vec2 chunk = floor(gl_FragCoord.xy / pixelSize);

        //             // 2. Slow down the jitter so it updates like a crappy security camera (~8 fps)
        //             float timeStep = floor(time * 8.0); 

        //             // 3. Generate a random UV coordinate for this specific screen chunk
        //             vec2 randomUv = vec2(
        //                 rand(chunk + timeStep),
        //                 rand(chunk + timeStep + 42.0)
        //             );

        //             // 4. Sample the original texture using the random UV
        //             // This ensures the censor blocks are made of the actual colors of the helmet
        //             vec4 color = texture2D(map, randomUv);

        //             // 5. Desaturate it slightly to match that gritty Bodycam vibe
        //             float gray = dot(color.rgb, vec3(0.299, 0.587, 0.114));
        //             color.rgb = mix(color.rgb, vec3(gray), 0.6);

        //             gl_FragColor = color;
        //         }
        //     `
        // });


        const dreamFaceMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0.0 },
                map: { value: null },
                pixelSize: { value: 32.0 } // Chunks across the 3D face
            },
            vertexShader: `
        varying vec2 vUv; 
        void main() { 
            vUv = uv; 
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); 
        }
    `,
            fragmentShader: `
        uniform float time; 
        uniform sampler2D map; 
        uniform float pixelSize; 
        varying vec2 vUv;

        float rand(vec2 co){ 
            return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); 
        }

        void main() {
            // 3D Model UV grid
            vec2 gridUv = floor(vUv * pixelSize) / pixelSize;

            // 8 FPS stutter
            float timeStep = floor(time * 8.0); 

            // Small twitch jitter
            float jitterX = (rand(gridUv + timeStep) - 0.5) * 0.08;
            float jitterY = (rand(gridUv + timeStep + 42.0) - 0.5) * 0.08;
            gridUv += vec2(jitterX, jitterY);

            // Sample real face colors
            vec4 color = texture2D(map, gridUv);

            gl_FragColor = color;
        }
    `
        });

        // 6. Load Texture and Model
        const textureLoader = new THREE.TextureLoader();
        // --> CHANGE TO YOUR TEXTURE <--
        const faceTexture = textureLoader.load('fehlemmetalne2.png');
        dreamFaceMaterial.uniforms.map.value = faceTexture;

        const loader = new GLTFLoader();
        // --> CHANGE TO YOUR GLB <--
        loader.load('android.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            model.traverse((child) => {
                if (child.isMesh && child.name.includes('FinalEchoMP')) {
                    if (Array.isArray(child.material)) {
                        for (let i = 0; i < child.material.length; i++) {
                            if (child.material[i].name.includes('FE_helmet')) {
                                if (child.material[i].map) dreamFaceMaterial.uniforms.map.value = child.material[i].map;
                                child.material[i] = dreamFaceMaterial;
                                break;
                            }
                        }
                    } else if (child.material.name.includes('FE_helmet')) {
                        if (child.material.map) dreamFaceMaterial.uniforms.map.value = child.material.map;
                        child.material = dreamFaceMaterial;
                    }
                }
            });
        });

        loader.load('Amphibian.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            model.traverse((child) => {
                if (child.isMesh && child.name.includes('FE_Head_   10')) {
                    if (Array.isArray(child.material)) {
                        for (let i = 0; i < child.material.length; i++) {
                            if (child.material[i].name.includes('FE_helmet_10.001')) {
                                if (child.material[i].map) dreamFaceMaterial.uniforms.map.value = child.material[i].map;
                                child.material[i] = dreamFaceMaterial;
                                break;
                            }
                        }
                    } else if (child.material.name.includes('FE_helmet_10.001')) {
                        if (child.material.map) dreamFaceMaterial.uniforms.map.value = child.material.map;
                        child.material = dreamFaceMaterial;
                    }
                }
            });
        });

        // 7. Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            dreamFaceMaterial.uniforms.time.value = clock.getElapsedTime();

            // Use Composer instead of standard render!
            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
