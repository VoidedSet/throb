<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dream Face Sandbox</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffaa;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border: 1px solid #00ffaa;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="info">Dream Face Sandbox — Bodycam Censor</div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { RenderPixelatedPass } from 'three/addons/postprocessing/RenderPixelatedPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        // ─────────────────────────────────────────────────────────────
        // CENSOR PARAMS
        // ─────────────────────────────────────────────────────────────
        const censorParams = {
            blockSize: 64.0,
            uvCoarseness: 64.0,
            fps: 8.0,
            jitter: 0.3,
            overspill: 0.9
        };

        // ─────────────────────────────────────────────────────────────
        // POST PARAMS
        // ─────────────────────────────────────────────────────────────
        const postParams = {
            pixelate: 4,
            normalEdge: 0.4,
            depthEdge: 0.4,
            posterLevels: 16.0,
            posterStrength: 0.5,
            bloomStrength: 0.34,
            bloomRadius: 1.0,
            bloomThreshold: 0.3,
            chromaStrength: 0.019,
            ambientIntensity: 1.6,
            dirIntensity: 2.6,
        };

        // ─────────────────────────────────────────────────────────────
        // SCENE
        // ─────────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.target.set(0, 1, 0);

        // ─────────────────────────────────────────────────────────────
        // LIGHTS
        // ─────────────────────────────────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0xffffff, postParams.ambientIntensity);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, postParams.dirIntensity);
        dirLight.position.set(5, 5, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0xaaaaff, 1.0);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        const groundSpot = new THREE.SpotLight(0xffffff, 3.0);
        groundSpot.position.set(0, 3, 0);
        groundSpot.target.position.set(0, 0, 0);
        groundSpot.angle = Math.PI / 10;
        groundSpot.penumbra = 0.85;
        groundSpot.distance = 8;
        groundSpot.castShadow = true;
        scene.add(groundSpot);
        scene.add(groundSpot.target);

        // ─────────────────────────────────────────────────────────────
        // GROUND PLANE
        // ─────────────────────────────────────────────────────────────
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 1.0, metalness: 0.0 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // ─────────────────────────────────────────────────────────────
        // POST-PROCESS SHADERS
        // ─────────────────────────────────────────────────────────────
        const PosterizationShader = {
            uniforms: {
                tDiffuse: { value: null },
                levels: { value: postParams.posterLevels },
                strength: { value: postParams.posterStrength }
            },
            vertexShader: `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
        `,
            fragmentShader: `
            uniform sampler2D tDiffuse;
            uniform float levels, strength;
            varying vec2 vUv;
            void main() {
                vec4 texel = texture2D(tDiffuse, vUv);
                vec3 posterized = floor(texel.rgb * levels) / levels;
                gl_FragColor = vec4(mix(texel.rgb, posterized, strength), texel.a);
            }
        `
        };

        const ChromaticAberrationShader = {
            uniforms: {
                tDiffuse: { value: null },
                aberrationStrength: { value: postParams.chromaStrength }
            },
            vertexShader: `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
        `,
            fragmentShader: `
            uniform sampler2D tDiffuse;
            uniform float aberrationStrength;
            varying vec2 vUv;
            void main() {
                vec2 d  = vUv - 0.5;
                vec2 ab = aberrationStrength * pow(length(d), 2.0) * normalize(d);
                float r = texture2D(tDiffuse, vUv + ab).r;
                float g = texture2D(tDiffuse, vUv).g;
                float b = texture2D(tDiffuse, vUv - ab).b;
                gl_FragColor = vec4(r, g, b, 1.0);
            }
        `
        };

        // ─────────────────────────────────────────────────────────────
        // EFFECT COMPOSER
        // ─────────────────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const pixelatedPass = new RenderPixelatedPass(
            postParams.pixelate, scene, camera,
            { normalEdgeStrength: postParams.normalEdge, depthEdgeStrength: postParams.depthEdge }
        );
        composer.addPass(pixelatedPass);

        const posterPass = new ShaderPass(PosterizationShader);
        composer.addPass(posterPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            postParams.bloomStrength, postParams.bloomRadius, postParams.bloomThreshold
        );
        composer.addPass(bloomPass);

        const chromaPass = new ShaderPass(ChromaticAberrationShader);
        composer.addPass(chromaPass);

        composer.addPass(new OutputPass());

        // ─────────────────────────────────────────────────────────────
        // HYBRID SCREENSPACE CENSOR MATERIAL (BASE)
        // ─────────────────────────────────────────────────────────────
        const censorMat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0.0 },
                map: { value: null },
                blockSize: { value: censorParams.blockSize },
                uvCoarseness: { value: censorParams.uvCoarseness },
                fps: { value: censorParams.fps },
                jitter: { value: censorParams.jitter },
                resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                overspill: { value: censorParams.overspill }
            },
            vertexShader: `
            uniform float overspill;
            varying vec2 vUv;
            varying vec4 vScreenPos;
            uniform float time, fps;

            void main() {
                vUv = uv;
                vec3 fatPos = position + normal * overspill * vec3(99.0); 
                
                vec4 clip = projectionMatrix * modelViewMatrix * vec4(fatPos, 1.0);
                vScreenPos = clip;
                gl_Position = clip;
            }
        `,
            fragmentShader: `
            uniform float time, fps, jitter, blockSize, uvCoarseness;
            uniform sampler2D map;
            uniform vec2 resolution;

            varying vec2 vUv;
            varying vec4 vScreenPos;

            float rand(vec2 c) {
                return fract(sin(dot(c, vec2(12.9898, 78.233))) * 43758.5453);
            }

            void main() {
                vec2 ndc    = vScreenPos.xy / vScreenPos.w;
                vec2 screen = (ndc * 0.5 + 0.5) * resolution;
                vec2 block  = floor(screen / blockSize);
                float t = floor(time * fps);
                vec2 jitterOff = vec2(
                    (rand(block + t)        - 0.5) * jitter,
                    (rand(block + t + 42.0) - 0.5) * jitter
                );
                vec2 blockUv = floor(vUv * uvCoarseness) / uvCoarseness;
                blockUv += jitterOff;
                gl_FragColor = texture2D(map, blockUv);
            }
        `
        });

        // ─────────────────────────────────────────────────────────────
        // SPAWN CHARS
        // ─────────────────────────────────────────────────────────────
        const allCensorMats = [];

        function spawnChar(glbPath, meshContains, matContains, posX = 0) {
            const mat = censorMat.clone();  // own instance, shares shader, own uniforms
            mat.uniforms = {
                time: { value: 0.0 },
                map: { value: null },
                blockSize: { value: censorParams.blockSize },
                uvCoarseness: { value: censorParams.uvCoarseness },
                fps: { value: censorParams.fps },
                jitter: { value: censorParams.jitter },
                resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            };

            new GLTFLoader().load(glbPath, (gltf) => {
                gltf.scene.position.x = posX;   // place in line
                gltf.scene.rotation.y = 0;      // face camera — flip to Math.PI if backwards
                scene.add(gltf.scene);

                gltf.scene.traverse((child) => {
                    if (!child.isMesh) return;
                    child.castShadow = true;
                    if (!child.name.includes(meshContains)) return;

                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                    mats.forEach((m, idx) => {
                        if (!m.name.includes(matContains)) return;
                        if (m.map) mat.uniforms.map.value = m.map;
                        if (Array.isArray(child.material)) child.material[idx] = mat;
                        else child.material = mat;
                    });
                });
            });

            allCensorMats.push(mat);  // tracked → time + gui updates hit all
        }

        spawnChar('android.glb', 'FinalEchoMP', 'FE_helmet', -1.8);
        spawnChar('Amphibian.glb', 'FE_Head_10', 'FE_helmet_10.001', 0.0);
        spawnChar('cyborg.glb', 'FinalEchoMP', 'FE_helmet_05_MAT', 1.8);
        spawnChar('Echo.glb', 'FinalEchoMP', 'FE_helmet_01_MAT', 3.6);


        // ─────────────────────────────────────────────────────────────
        // LIL.GUI
        // ─────────────────────────────────────────────────────────────
        const gui = new GUI({ title: 'Dream Face Controls' });

        const cF = gui.addFolder('Censor Shader');
        cF.add(censorParams, 'blockSize', 4, 64, 1)
            .name('block size (px)')
            .onChange(v => allCensorMats.forEach(m => m.uniforms.blockSize.value = v));
        cF.add(censorParams, 'uvCoarseness', 2, 64, 1)
            .name('color coarseness')
            .onChange(v => allCensorMats.forEach(m => m.uniforms.uvCoarseness.value = v));
        cF.add(censorParams, 'fps', 1, 30, 1)
            .name('stutter fps')
            .onChange(v => allCensorMats.forEach(m => m.uniforms.fps.value = v));
        cF.add(censorParams, 'jitter', 0, 0.3, 0.005)
            .name('jitter amt')
            .onChange(v => allCensorMats.forEach(m => m.uniforms.jitter.value = v));
        cF.add(censorParams, 'overspill', 0.0, 1.0, 0.01)
            .name('spill amount')
            .onChange(v => allCensorMats.forEach(m => m.uniforms.overspill.value = v));
        cF.open();

        const pF = gui.addFolder('Post Processing');
        pF.add(postParams, 'pixelate', 1, 16, 1)
            .name('pixelate size')
            .onChange(v => pixelatedPass.pixelSize = v);
        pF.add(postParams, 'posterLevels', 2, 32, 1)
            .name('poster levels')
            .onChange(v => posterPass.uniforms.levels.value = v);
        pF.add(postParams, 'posterStrength', 0, 1, 0.01)
            .name('poster strength')
            .onChange(v => posterPass.uniforms.strength.value = v);
        pF.add(postParams, 'bloomStrength', 0, 3, 0.01)
            .name('bloom strength')
            .onChange(v => bloomPass.strength = v);
        pF.add(postParams, 'bloomRadius', 0, 1, 0.01)
            .name('bloom radius')
            .onChange(v => bloomPass.radius = v);
        pF.add(postParams, 'bloomThreshold', 0, 1, 0.01)
            .name('bloom threshold')
            .onChange(v => bloomPass.threshold = v);
        pF.add(postParams, 'chromaStrength', 0, 0.05, 0.001)
            .name('chroma shift')
            .onChange(v => chromaPass.uniforms.aberrationStrength.value = v);
        pF.close();

        const lF = gui.addFolder('Lights');
        lF.add(postParams, 'ambientIntensity', 0, 5, 0.1)
            .name('ambient')
            .onChange(v => ambientLight.intensity = v);
        lF.add(postParams, 'dirIntensity', 0, 10, 0.1)
            .name('main light')
            .onChange(v => dirLight.intensity = v);
        lF.close();

        // ─────────────────────────────────────────────────────────────
        // ANIMATE
        // ─────────────────────────────────────────────────────────────
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();

            const t = clock.getElapsedTime();
            allCensorMats.forEach(m => m.uniforms.time.value = t);

            composer.render();
        }

        animate();

        // ─────────────────────────────────────────────────────────────
        // RESIZE
        // ─────────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);

            allCensorMats.forEach(m => m.uniforms.resolution.value.set(window.innerWidth, window.innerHeight));
        });

    </script>
</body>

</html>
